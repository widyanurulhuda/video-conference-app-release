# .readthedocs.yaml
version: 2

build:
  os: ubuntu-24.04
  tools:
    # Use 3.12 for broad compatibility; upgrade to 3.13 later after deps support it
    python: "3.12"

sphinx:
  # If conf.py is at repo root, use "conf.py". If under docs/, use "docs/conf.py"
  configuration: conf.py

python:
  install:
    - requirements: requirements.txt
